<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>lockin</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("lockin_theme");
        var fontStyle = localStorage.getItem("lockin_font_style");
        var root = document.documentElement;
        if (theme === "dark") {
          root.classList.add("dark");
          root.style.colorScheme = "dark";
        } else {
          root.style.colorScheme = "light";
        }
        if (fontStyle === "mono") {
          root.classList.add("font-mono-mode");
        }
      } catch (_err) {
        // no-op
      }
    })();
  </script>
  <style>
    html { background: #f4eee5; }
    html.dark { background: #1a1230; }
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%237c3aed' rx='20' width='100' height='100'/><text x='50' y='72' text-anchor='middle' font-size='60' fill='white'>⏱</text></svg>">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
